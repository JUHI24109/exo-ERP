<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Task Management | EXO GLOBAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f0f2f5;
            --sidebar-bg: #ffffff;
            --accent: #1d4ed8;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #edeef2;
            --card-bg: #ffffff;
            --primary: #0a192f;
        }

        body { margin: 0; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Styles (Consistent with Dashboard) */
        #sidebar { width: 220px; background: #0a192f; border-right: none; display: flex; flex-direction: column; flex-shrink: 0; color: #ffffff; }
        .sb-header { padding: 30px 24px; display: flex; align-items: center; gap: 12px; }
        .logo { height: 60px; padding: 0 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        nav { flex: 1; padding: 20px; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: rgba(255,255,255,0.7); text-decoration: none; border-radius: 4px; transition: 0.3s; margin-bottom: 5px; font-weight: 500; font-size: 14px; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: #ffffff; }
        .nav-link.active { background: rgba(255,255,255,0.1); color: #ffffff; box-shadow: inset 3px 0 0 #3b82f6; }

        /* Main Content */
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 80px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .header h1 { font-family: 'Outfit'; font-size: 24px; font-weight: 800; }

        .content { flex: 1; overflow-y: auto; padding: 40px; }

        /* Toolbar */
        .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        .filters { display: flex; gap: 12px; }
        .filter-btn { padding: 10px 18px; border-radius: 4px; border: 1px solid var(--border); background: white; color: var(--text-muted); cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.3s; }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-add { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 4px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3); }

        /* Kanban Board / List */
        .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 24px; }
        .task-card { background: white; border-radius: 16px; border: 1px solid var(--border); padding: 24px; cursor: pointer; transition: 0.3s; position: relative; }
        .task-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        
        .priority-badge { font-size: 10px; font-weight: 800; text-transform: uppercase; padding: 4px 10px; border-radius: 6px; margin-bottom: 12px; display: inline-block; }
        .p-Critical { background: #fee2e2; color: #ef4444; }
        .p-High { background: #ffedd5; color: #f59e0b; }
        .p-Medium { background: #eff6ff; color: #3b82f6; }
        .p-Low { background: #f1f5f9; color: #64748b; }

        .task-id { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 700; }
        .task-title { font-family: 'Outfit'; font-size: 17px; font-weight: 700; color: var(--primary); margin-bottom: 12px; line-height: 1.4; }
        .task-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
        
        .assignee { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 32px; height: 32px; border-radius: 4px; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--primary); }
        .due-date { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }

        .status-pill { font-size: 11px; font-weight: 700; color: var(--text-muted); background: #f1f5f9; padding: 4px 12px; border-radius: 16px; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: white; width: 500px; border-radius: 24px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .modal h2 { font-family: 'Outfit'; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--primary); }
        .form-input { width: 100%; padding: 12px 16px; border-radius: 4px; border: 1px solid var(--border); outline: none; transition: 0.3s; font-family: inherit; }
        .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .modal-actions { display: flex; gap: 12px; margin-top: 30px; }
        .btn-cancel { flex: 1; padding: 12px; border-radius: 4px; border: 1px solid var(--border); background: white; font-weight: 700; cursor: pointer; }
        .btn-save { flex: 1; padding: 12px; border-radius: 4px; border: none; background: var(--accent); color: white; font-weight: 700; cursor: pointer; }

    
        /* Mobile Responsiveness */
        @media (max-width: 1024px) {
            .content { grid-template-columns: 1fr !important; gap: 20px; padding: 20px; }
            .dashboard-grid { grid-template-columns: 1fr !important; }
            .metrics-grid { grid-template-columns: repeat(2, 1fr) !important; }
            header, .topbar { padding: 0 20px !important; }
        }
        @media (max-width: 768px) {
            body { flex-direction: column !important; }
            #sidebar { width: 100% !important; height: auto !important; flex-direction: row !important; flex-wrap: wrap; justify-content: space-between; align-items: center; padding: 10px; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
            .logo { height: 40px !important; padding: 0 10px !important; border: none !important; font-size: 18px; width: 100%; justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.05) !important; margin-bottom: 5px; }
            .nav-list, nav { flex-direction: row !important; padding: 0 !important; width: 100% !important; overflow-x: auto !important; gap: 5px !important; align-items: center; }
            .nav-item { padding: 8px 12px !important; font-size: 13px !important; white-space: nowrap !important; border-radius: 4px !important; }
            .metrics-grid { grid-template-columns: 1fr !important; }
            header, .topbar { height: auto !important; flex-direction: column !important; padding: 15px !important; align-items: stretch !important; gap: 15px !important; }
            .search { width: 100% !important; }
            .top-right { width: 100% !important; justify-content: space-between !important; }
            .dashboard { padding: 15px !important; }
            .modal { width: 95% !important; padding: 20px !important; border-radius: 12px !important; max-height: 80vh !important; }
            .chat-container { flex-direction: column !important; }
            .chat-sidebar { width: 100% !important; height: 250px !important; border-right: none !important; border-bottom: 1px solid var(--border) !important; flex-shrink: 0; }
            .ticket-header { flex-direction: column !important; gap: 10px !important; align-items: flex-start !important; }
            .action-bar { flex-direction: column !important; align-items: flex-start !important; gap: 15px !important; }
            .detail-pane { border-radius: 12px !important; }
            .btn { width: 100% !important; justify-content: center !important; }
        }

    
/* ── SIDEBAR ── */
#sidebar{width:250px;background:#1e293b;border-right:2px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
@media (min-width: 769px) { #sidebar { height: 100vh; position: sticky; top: 0; } }
.logo{height:100px;padding:0 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;justify-content:flex-start;}
.logo-icon{width:52px;height:52px;border-radius:8px;background:transparent;display:flex;align-items:center;justify-content:center;overflow:hidden;border:none}
.logo-icon img{width:100%;height:100%;object-fit:contain;border-radius:8px}
.logo-text{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:#fff}
#sidebar nav{flex:1;padding:18px 12px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;}
.nav-link{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:4px;color:#ffffff;text-decoration:none;font-weight:600;transition:.2s;border:1px solid transparent;font-size:13px}
.nav-link:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.05)}
.nav-link.active{background:rgba(14,165,233,0.15);border:1px solid var(--primary);box-shadow:inset 3px 0 0 var(--primary)}
.nav-link .count-badge{background:var(--primary);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:99px;margin-left:auto}

</style>
</head>
<body>


<aside id="sidebar">
    <div class="logo"><img src="exologo.png?v=2" class="sidebar-logo" style="width:80px;height:80px;border-radius:8px;object-fit:contain;"/></div>
    <nav>
        <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-house"></i> Dashboard</a>
        <a href="employees.html" class="nav-link"><i class="fa-solid fa-users"></i> Employees</a>
        <a href="attendance.html" class="nav-link"><i class="fa-solid fa-user-check"></i> Attendance</a>
        <a href="tickets.html" class="nav-link"><i class="fa-solid fa-ticket"></i> Tickets</a>
        <a href="chat.html" class="nav-link"><i class="fa-solid fa-message"></i> Chat</a>
        <a href="meeting.html" class="nav-link"><i class="fa-solid fa-video"></i> Live Meeting</a>
        <a href="documents.html" class="nav-link"><i class="fa-solid fa-folder-open"></i> Documents</a>
        <a href="history.html" class="nav-link"><i class="fa-solid fa-clock-rotate-left"></i> History Center</a>
        <a href="undertakings.html" class="nav-link" id="navUndertakings" style="display:none;"><i class="fa-solid fa-handshake"></i> Undertakings</a>
        <div style="flex:1"></div>
        <a href="profile.html" class="nav-link"><i class="fa-solid fa-id-badge"></i> My Profile</a>
        <a href="javascript:void(0)" onclick="logout()" class="nav-link" style="color:var(--danger)"><i class="fa-solid fa-power-off"></i> Logout</a>
    </nav>
</aside>


<main id="main">
    <header class="header">
        <h1>Advanced Tickets</h1>
        <div style="display:flex; align-items:center; gap:20px;">
            <div id="userPill" style="width:40px; height:40px; border-radius:50%; background:var(--accent); color:white; display:flex; align-items:center; justify-content:center; font-weight:800;">U</div>
        </div>
    </header>

    <div class="content">
        <div class="toolbar">
            <div class="filters">
                <button class="filter-btn active" onclick="filterTasks('All')">All Tickets</button>
                <button class="filter-btn" onclick="filterTasks('Pending')">Pending</button>
                <button class="filter-btn" onclick="filterTasks('In Progress')">In Progress</button>
                <button class="filter-btn" onclick="filterTasks('Completed')">Completed</button>
            </div>
            <button class="btn-add" onclick="openModal()"><i class="fa-solid fa-plus"></i> Create Ticket</button>
        </div>

        <div id="tasksList" class="task-grid">
            <!-- Tasks cards will be loaded here -->
        </div>
    </div>
</main>

<div id="taskModal" class="modal-overlay">
    <div class="modal">
        <h2>Create New Ticket</h2>
        <div class="form-group">
            <label class="form-label">Subject / Title</label>
            <input type="text" id="taskTitle" class="form-input" placeholder="Enter ticket subject">
        </div>
        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea id="taskDesc" class="form-input" style="height: 100px; resize: none;" placeholder="Provide details..."></textarea>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label class="form-label">Assign To</label>
                <select id="taskAssignee" class="form-input"></select>
            </div>
            <div class="form-group">
                <label class="form-label">Priority</label>
                <select id="taskPriority" class="form-input">
                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                    <option value="Critical">Critical</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Deadline</label>
            <input type="date" id="taskDeadline" class="form-input">
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save" onclick="saveTask()">Create Ticket</button>
        </div>
    </div>
</div>

<script src="js/tasks.js"></script>
<script src="/js/nav-sync.js"></script>
</body>
</html>
