<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Management | EXO GLOBAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0a192f;
            --accent: #1d4ed8;
            --bg: #111827;
            --surface: #1f2937;
            --border: #374151;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        #sidebar { width: 220px; background: #0a192f; display: flex; flex-direction: column; color: white; flex-shrink: 0; }
        .logo { height: 60px; padding: 0 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: bold; }
        .nav-list { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 4px; color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 500; transition: 0.2s; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: #1f2937; color: white; }

        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 80px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; flex-shrink: 0; }
        header h1 { font-family: 'Outfit'; font-size: 24px; font-weight: 800; }

        .content { flex: 1; overflow-y: auto; padding: 30px 40px; }

        .top-actions { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
        .btn:hover { opacity: 0.9; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        
        .folder-card, .file-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; }
        .folder-card:hover, .file-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .folder-card i { font-size: 40px; color: #f59e0b; margin-bottom: 10px; }
        .file-card i { font-size: 40px; color: #3b82f6; margin-bottom: 10px; }
        
        .item-name { font-weight: 600; font-size: 14px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-sub { font-size: 11px; color: var(--text-muted); }

        .item-actions { position: absolute; top: 10px; right: 10px; display: none; gap: 5px; }
        .folder-card:hover .item-actions, .file-card:hover .item-actions { display: flex; }
        .action-btn { background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 4px; width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; }
        .action-btn:hover { background: var(--danger); }
        .action-btn.edit:hover { background: var(--accent); }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
        .modal-content { background: var(--surface); width: 400px; border-radius: 12px; padding: 24px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .modal h2 { margin-bottom: 15px; font-family: 'Outfit'; font-size: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: white; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #374151; }

        /* Breadcrumbs */
        .breadcrumbs { display: flex; gap: 10px; font-size: 14px; margin-bottom: 20px; align-items: center; color: var(--text-muted); cursor: pointer; }
        .breadcrumbs span:hover { color: white; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="logo"><img src="exologo.png" class="sidebar-logo" style="width:80px;height:80px;border-radius:8px;object-fit:contain;"/></div>
        <div class="nav-list">
            <a href="dashboard.html" class="nav-item" id="navDash"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="documents.html" class="nav-item active"><i class="fa-solid fa-folder-open"></i> Documents</a>
            <a href="tickets.html" class="nav-item"><i class="fa-solid fa-ticket"></i> Tickets</a>
            <a href="meeting.html" class="nav-item"><i class="fa-solid fa-video"></i> Meetings</a>
            <div style="flex:1;"></div>
            <a href="#" onclick="logout()" class="nav-item" style="color:var(--danger);"><i class="fa-solid fa-power-off"></i> Logout</a>
        </div>
    </aside>

    <main>
        <header>
            <h1>Document Management</h1>
            <div class="user-badge" id="userName" style="background:#1f2937; padding:8px 16px; border-radius:20px; font-weight:600;">Admin</div>
        </header>

        <div class="content">
            <div class="top-actions">
                <div class="breadcrumbs" id="breadcrumbs">
                    <span onclick="loadFolders()"><i class="fa-solid fa-home"></i> Root Directory</span>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn" onclick="showCreateFolder()"><i class="fa-solid fa-folder-plus"></i> New Folder</button>
                    <button class="btn" onclick="showUploadModal()"><i class="fa-solid fa-cloud-arrow-up"></i> Upload File</button>
                </div>
            </div>

            <div class="grid" id="docGrid">
                <!-- Loaded via JS -->
            </div>
        </div>
    </main>

    <!-- Upload Modal -->
    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <h2>Upload Document</h2>
            <form id="uploadForm" onsubmit="handleUpload(event)">
                <div class="form-group">
                    <label>Employee ID / Folder Target</label>
                    <input type="text" id="upEmployeeId" required placeholder="EXO-1001">
                </div>
                <div class="form-group">
                    <label>Document Title</label>
                    <input type="text" id="upTitle" required placeholder="Passport Copy">
                </div>
                <div class="form-group">
                    <label>Document Type</label>
                    <select id="upType">
                        <option value="ID">ID Document</option>
                        <option value="Contract">Contract</option>
                        <option value="Certificate">Certificate</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>File</label>
                    <input type="file" id="upFile" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-cancel" onclick="closeModals()">Cancel</button>
                    <button type="submit" class="btn">Upload</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Folder Modal -->
    <div class="modal" id="folderModal">
        <div class="modal-content">
            <h2>Create Folder</h2>
            <form id="folderForm" onsubmit="handleCreateFolder(event)">
                <div class="form-group">
                    <label>Assign to Employee ID (Required for structure)</label>
                    <input type="text" id="fEmployeeId" required placeholder="EXO-1001">
                </div>
                <div class="form-group">
                    <label>Folder Name</label>
                    <input type="text" id="fName" required placeholder="Financial Records">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-cancel" onclick="closeModals()">Cancel</button>
                    <button type="submit" class="btn">Create</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('userName').innerText = user.name || user.fullName || 'Admin';

        // Set correct dashboard link
        const dashMap = { 'Chairman':'dashboard.html', 'CEO':'dashboard.html', 'IT Admin':'dashboard.html', 'HR': 'dashboard.html' };
        document.getElementById('navDash').href = dashMap[user.role] || 'dashboard.html';

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }

        let currentFolders = [];
        let currentLevel = 'root'; // 'root' or employeeId
        let currentEmpName = '';

        async function loadFolders() {
            currentLevel = 'root';
            document.getElementById('breadcrumbs').innerHTML = `<span onclick="loadFolders()"><i class="fa-solid fa-home"></i> Root Directory</span>`;
            
            try {
                const res = await fetch('/api/employee-documents/folders', { headers: { Authorization: `Bearer ${token}` } });
                const data = await res.json();
                currentFolders = data;
                renderRootFolders();
            } catch(e) { console.error(e); }
        }

        function renderRootFolders() {
            const grid = document.getElementById('docGrid');
            grid.innerHTML = '';
            
            if(!currentFolders.length) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 40px; color:var(--text-muted);">No directories found. Start by uploading files or creating folders.</div>`;
                return;
            }

            currentFolders.forEach(f => {
                const card = document.createElement('div');
                card.className = 'folder-card';
                card.onclick = () => openFolder(f.employeeId, f.employeeName);
                card.innerHTML = `
                    <i class="fa-solid fa-folder"></i>
                    <div class="item-name">${f.employeeName}</div>
                    <div class="item-sub">${f.employeeId} • ${f.documents.length} items</div>
                `;
                grid.appendChild(card);
            });
        }

        function openFolder(empId, empName) {
            currentLevel = empId;
            currentEmpName = empName;
            document.getElementById('breadcrumbs').innerHTML = `
                <span onclick="loadFolders()"><i class="fa-solid fa-home"></i> Root Directory</span>
                <i class="fa-solid fa-chevron-right" style="font-size:10px;"></i>
                <span>${empName} (${empId})</span>
            `;
            
            const folderObj = currentFolders.find(f => f.employeeId === empId);
            const grid = document.getElementById('docGrid');
            grid.innerHTML = '';

            if(!folderObj || !folderObj.documents.length) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 40px; color:var(--text-muted);">Folder is empty.</div>`;
                return;
            }

            folderObj.documents.forEach(doc => {
                const isFolder = doc.docType === 'Folder';
                const card = document.createElement('div');
                card.className = isFolder ? 'folder-card' : 'file-card';
                
                if (!isFolder) {
                    card.onclick = () => window.open(doc.fileUrl, '_blank');
                }

                const icon = isFolder ? '<i class="fa-solid fa-folder"></i>' : '<i class="fa-solid fa-file-pdf"></i>';
                
                card.innerHTML = `
                    <div class="item-actions">
                        <button class="action-btn" onclick="event.stopPropagation(); deleteDoc(${doc.id})"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    ${icon}
                    <div class="item-name" title="${doc.docTitle}">${doc.docTitle}</div>
                    <div class="item-sub">${new Date(doc.createdAt).toLocaleDateString()}</div>
                `;
                grid.appendChild(card);
            });
        }

        async function deleteDoc(id) {
            if(!confirm("Are you sure you want to delete this?")) return;
            try {
                await fetch('/api/employee-documents/' + id, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
                loadFolders();
            } catch(e) {}
        }

        function showUploadModal() { 
            document.getElementById('uploadModal').style.display = 'flex'; 
            if(currentLevel !== 'root') document.getElementById('upEmployeeId').value = currentLevel;
        }
        function showCreateFolder() { 
            document.getElementById('folderModal').style.display = 'flex'; 
            if(currentLevel !== 'root') document.getElementById('fEmployeeId').value = currentLevel;
        }
        function closeModals() { 
            document.getElementById('uploadModal').style.display = 'none'; 
            document.getElementById('folderModal').style.display = 'none'; 
        }

        async function handleUpload(e) {
            e.preventDefault();
            const formData = new FormData();
            formData.append('employeeId', document.getElementById('upEmployeeId').value);
            formData.append('docTitle', document.getElementById('upTitle').value);
            formData.append('docType', document.getElementById('upType').value);
            formData.append('files', document.getElementById('upFile').files[0]);

            try {
                const res = await fetch('/api/employee-documents/upload', {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${token}` },
                    body: formData
                });
                if(res.ok) { closeModals(); loadFolders(); }
                else { const err = await res.json(); alert(err.error || 'Upload failed'); }
            } catch(e) {}
        }

        async function handleCreateFolder(e) {
            e.preventDefault();
            try {
                const res = await fetch('/api/employee-documents/create-folder', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
                    body: JSON.stringify({
                        employeeId: document.getElementById('fEmployeeId').value,
                        folderName: document.getElementById('fName').value
                    })
                });
                if(res.ok) { closeModals(); loadFolders(); }
            } catch(e) {}
        }

        loadFolders();
    </script>
</body>
</html>
