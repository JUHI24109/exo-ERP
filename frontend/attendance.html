<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance | EXO GLOBAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root{
            --bg:#f8fafc;
            --surface:#ffffff;
            --border:#cbd5e1;
            --border-soft:#e2e8f0;
            --text-main:#1e293b;
            --text-light:#64748b;
            --primary:#000080;
            --primary-dark:#000066;
            --accent:#3b82f6;
            --success:#16a34a;
            --danger:#dc2626;
            --warning:#f59e0b;
            --pink-bg:#eff6ff;
            --pink-light:#dbeafe;
        }
        body { margin:0; background:var(--bg); font-family:'Inter',sans-serif; display:flex; height:100vh; overflow:hidden; color:var(--text-main); font-size:13px; }
        
        /* ── SIDEBAR ── */
#sidebar{width:250px;background:#1e293b;border-right:2px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
@media (min-width: 769px) { #sidebar { height: 100vh; position: sticky; top: 0; } }
.logo{height:100px;padding:0 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;justify-content:flex-start;}
.logo-icon{width:52px;height:52px;border-radius:8px;background:transparent;display:flex;align-items:center;justify-content:center;overflow:hidden;border:none}
.logo-icon img{width:100%;height:100%;object-fit:contain;border-radius:8px}
.logo-text{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:#fff}
#sidebar nav{flex:1;padding:18px 12px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;}
.nav-link{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:4px;color:#ffffff;text-decoration:none;font-weight:600;transition:.2s;border:1px solid transparent;font-size:13px}
.nav-link:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.05)}
.nav-link.active{background:rgba(14,165,233,0.15);border:1px solid var(--primary);box-shadow:inset 3px 0 0 var(--primary)}
.nav-link .count-badge{background:var(--primary);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:99px;margin-left:auto}
        
        /* MAIN */
        main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;background:#fefefe}
        header{height:72px;border-bottom:2px solid var(--border-soft);padding:0 26px;display:flex;align-items:center;justify-content:space-between;background:#fff; flex-shrink:0;}
        header h1{font-family:'Outfit',sans-serif;font-size:22px;color:var(--primary);font-weight:800}
        .top-right{display:flex;align-items:center;gap:16px}
        .top-right-profile{display:flex;align-items:center;gap:10px;padding-left:16px;border-left:1px solid var(--border-soft)}
        .top-right-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#a855f7);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px}
        
        .content { flex:1; overflow-y:auto; padding:20px; }
        
        .card { background: var(--surface); border: 2px solid var(--border-soft); border-radius: 14px; display: flex; flex-direction: column; overflow: hidden; margin-bottom: 20px; }
        .card-header { padding:16px 20px; border-bottom: 1px solid var(--border-soft); background:#fff; display:flex; justify-content:space-between; align-items:center; }
        .card-title { font-size:16px; font-weight:700; color:var(--primary); font-family:'Outfit',sans-serif; }
        .card-body { padding:20px; }

        .toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
        .input { padding:9px 12px; border:1px solid var(--border-soft); border-radius:8px; font-size:13px; font-family:'Inter',sans-serif; outline:none; transition:border-color .2s; }
        .input:focus { border-color:var(--primary); }
        .btn { border:none; border-radius:8px; padding:9px 14px; font-weight:700; cursor:pointer; font-size:12px; transition:all .1s; font-family:'Inter',sans-serif; }
        .btn:active { transform:scale(.97); }
        .btn-primary { background:linear-gradient(135deg,var(--primary),#a855f7); color:#fff; box-shadow:0 2px 10px rgba(0,0,128,.25); }
        .btn-soft { background:var(--pink-bg); color:var(--primary); border:1px solid var(--border-soft); }
        .btn-soft:hover { background:var(--pink-light); }
        
        table { width:100%; border-collapse:collapse; }
        th, td { padding:12px 14px; border-bottom:1px solid var(--pink-light); text-align:left; vertical-align:top; font-size:13px; }
        th { font-size:11px; color:var(--text-light); text-transform:uppercase; letter-spacing:.5px; background:var(--pink-bg); font-weight:700; }
        tr:hover td { background:var(--pink-bg); cursor:pointer; }
        .badge { display:inline-block; padding:4px 10px; border-radius:999px; font-size:11px; font-weight:700; }
        .badge-ok { background:#dcfce7; color:#166534; }
        .badge-pending { background:#fef3c7; color:#92400e; }
        .badge-no { background:#fee2e2; color:#991b1b; }

        /* Modal */
        .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(15,23,42,0.5); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center; z-index:999; }
        .modal { background:#fff; border-radius:16px; width:90%; max-width:800px; max-height:90vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 10px 40px rgba(0,0,0,0.2); }
        .modal-header { padding:20px; border-bottom:1px solid var(--border-soft); display:flex; justify-content:space-between; align-items:center; background:var(--pink-bg); }
        .modal-title { font-family:'Outfit',sans-serif; font-size:18px; font-weight:800; color:var(--primary); }
        .modal-close { background:none; border:none; font-size:20px; color:var(--text-light); cursor:pointer; }
        .modal-close:hover { color:var(--danger); }
        .modal-body { padding:20px; overflow-y:auto; flex:1; }
        
        /* Clock-in card */
        .clockin-card { background:white; border-radius: 16px; border:1px solid #f1f5f9; box-shadow:0 4px 20px rgba(0,0,0,0.06); padding:40px 28px; text-align:center; margin-bottom:24px; position:relative; overflow:hidden; }
        .live-clock { font-size:52px; font-weight:800; color:#0f172a; letter-spacing:-2px; margin-bottom:4px; font-family:'Outfit',sans-serif; }
        .live-date  { font-size:14px; color:#94a3b8; margin-bottom:32px; font-weight:500; }
        .clock-actions { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
        .clock-btn { display:inline-flex; align-items:center; gap:10px; padding:14px 30px; border-radius:50px; border:none; font-size:15px; font-weight:700; font-family:'Inter',sans-serif; cursor:pointer; transition:all .25s; box-shadow:0 4px 14px rgba(0,0,0,0.12); }
        .clock-btn:hover:not(:disabled) { transform:translateY(-3px); }
        .clock-btn:disabled { opacity:.45; cursor:not-allowed; transform:none !important; box-shadow:none; }
        .clock-btn.checkin  { background:linear-gradient(135deg,#3b82f6,#6366f1); color:white; }
        .clock-btn.checkout { background:linear-gradient(135deg,#ef4444,#f97316); color:white; }
        
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="logo"><img src="exologo.png" class="sidebar-logo" style="width:80px;height:80px;border-radius:8px;object-fit:contain;"/></div>
    <nav id="navLinks">
        <!-- Injected by JS based on role -->
    </nav>
</aside>

<main>
    <header>
        <h1 id="pageTitle">Attendance Hub</h1>
        <div class="top-right">
            <i class="fa-regular fa-bell" style="font-size:20px;color:var(--primary);cursor:pointer"></i>
            <div class="top-right-profile">
                <div style="text-align:right">
                    <div style="font-weight:700;font-size:13px;color:var(--primary)" id="userName">User</div>
                    <div style="font-size:11px;color:var(--text-light)" id="userRoleTitle">Role</div>
                </div>
                <div class="top-right-avatar" id="userInitial">U</div>
            </div>
        </div>
    </header>

    <div class="content">

        <!-- ADMIN VIEW (Company-wide Attendance) -->
        <div id="adminView" style="display:none;">
            <div class="card">
                <div class="card-header">
                    <div class="card-title"><i class="fa-solid fa-users" style="color:var(--primary)"></i> Company-wide Attendance</div>
                </div>
                <div class="card-body">
                    <div class="toolbar">
                        <span style="font-size:12px; font-weight:600; color:var(--text-light);">From:</span>
                        <input type="date" id="filterFrom" class="input">
                        <span style="font-size:12px; font-weight:600; color:var(--text-light);">To:</span>
                        <input type="date" id="filterTo" class="input">
                        <button class="btn btn-primary" onclick="loadCompanyAttendance()"><i class="fa-solid fa-filter"></i> Filter</button>
                        <button class="btn btn-soft" onclick="downloadCompanyExcel()"><i class="fa-solid fa-download"></i> Export Excel</button>
                    </div>
                    
                    <div style="overflow-x:auto; border:1px solid var(--border-soft); border-radius:10px;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Employee</th>
                                    <th>Total Days</th>
                                    <th>Present</th>
                                    <th>Half Days</th>
                                    <th>Leave / Absent</th>
                                    <th>Total Hours</th>
                                </tr>
                            </thead>
                            <tbody id="companyTableBody">
                                <tr><td colspan="6" style="text-align:center; padding:30px; color:var(--text-light);">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- EMPLOYEE VIEW (Personal Clock-in) -->
        <div id="employeeView" style="display:none;">
            <div class="clockin-card">
                <div class="live-clock" id="liveClock">--:--:--</div>
                <div class="live-date" id="liveDate">Loading...</div>
                <div class="clock-actions">
                    <button id="checkInBtn" class="clock-btn checkin" onclick="checkIn()"><i class="fa-solid fa-right-to-bracket"></i> Check In</button>
                    <button id="checkOutBtn" class="clock-btn checkout" onclick="checkOut()" disabled><i class="fa-solid fa-right-from-bracket"></i> Check Out</button>
                </div>
                <div id="statusPill" style="display:none; margin-top:20px; font-weight:700; color:var(--primary);">Status Message</div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">My Recent Attendance</div>
                </div>
                <div class="card-body" style="padding:0;">
                    <div style="overflow-x:auto;">
                        <table>
                            <thead>
                                <tr><th>Date</th><th>Check In</th><th>Check Out</th><th>Hours</th><th>Status</th></tr>
                            </thead>
                            <tbody id="myTableBody">
                                <tr><td colspan="5" style="text-align:center; padding:30px; color:var(--text-light);">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>

<!-- Employee Details Modal -->
<div class="modal-overlay" id="empModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">Employee Attendance</div>
            <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <div style="overflow-x:auto; border:1px solid var(--border-soft); border-radius:10px;">
                <table>
                    <thead>
                        <tr><th>Date</th><th>Check In</th><th>Check Out</th><th>Hours</th><th>Status</th></tr>
                    </thead>
                    <tbody id="modalTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    
    document.getElementById('userName').innerText = user.name || user.fullName || 'User';
    document.getElementById('userInitial').innerText = (user.name || user.fullName || 'U').charAt(0).toUpperCase();
    document.getElementById('userRoleTitle').innerText = user.role || 'Employee';

    const isAdmin = ['HR', 'HR Manager', 'IT Admin', 'CEO', 'Chairman'].includes(user.role);

    // Setup Sidebar based on role
    function getDashboardLink() {
        if(user.role === 'Chairman') return 'dashboard.html';
        if(user.role === 'CEO') return 'dashboard.html';
        if(user.role === 'IT Admin') return 'dashboard.html';
        if(['HR', 'HR Manager'].includes(user.role)) return 'dashboard.html';
        return 'dashboard.html';
    }

    const nav = document.getElementById('navLinks');
    nav.innerHTML = `
        <a href="${getDashboardLink()}" class="nav-link"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        <a href="employees.html" class="nav-link"><i class="fa-solid fa-users"></i> Employees</a>
        <a href="attendance.html" class="nav-link active"><i class="fa-solid fa-user-check"></i> Attendance</a>
        <a href="tickets.html" class="nav-link"><i class="fa-solid fa-ticket"></i> Tickets</a>
        <a href="chat.html" class="nav-link"><i class="fa-solid fa-message"></i> Chat</a>
        <div style="flex:1"></div>
        <a href="javascript:void(0)" onclick="logout()" class="nav-link" style="color:var(--danger)"><i class="fa-solid fa-power-off"></i> Logout</a>
    `;

    function logout() { localStorage.clear(); window.location.href = '/'; }

    // Init View
    if (isAdmin) {
        document.getElementById('adminView').style.display = 'block';
        // Set default dates to current month
        const today = new Date();
        const firstDay = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().slice(0, 10);
        const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0).toISOString().slice(0, 10);
        document.getElementById('filterFrom').value = firstDay;
        document.getElementById('filterTo').value = lastDay;
        loadCompanyAttendance();
    } else {
        document.getElementById('employeeView').style.display = 'block';
        initClock();
        loadMyAttendance();
    }

    /* --- ADMIN LOGIC --- */
    let companyAttendanceData = [];

    async function loadCompanyAttendance() {
        const from = document.getElementById('filterFrom').value;
        const to = document.getElementById('filterTo').value;
        if (!from || !to) return alert('Please select both From and To dates.');
        
        try {
            const res = await fetch(`/api/attendance/admin/range?from=${from}&to=${to}`, { headers: { Authorization: `Bearer ${token}` } });
            const data = await res.json();
            companyAttendanceData = data.summary || [];
            renderCompanyTable();
        } catch(e) {
            console.error(e);
            alert('Failed to load company attendance.');
        }
    }

    function renderCompanyTable() {
        const tbody = document.getElementById('companyTableBody');
        tbody.innerHTML = '';
        if (companyAttendanceData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:30px; color:var(--text-light);">No attendance records found for this date range.</td></tr>';
            return;
        }

        companyAttendanceData.forEach(emp => {
            const tr = document.createElement('tr');
            tr.onclick = () => openModal(emp);
            tr.innerHTML = `
                <td>
                    <div style="font-weight:700;">${emp.fullName}</div>
                    <div style="font-size:11px; color:var(--text-light);">${emp.employeeId} • ${emp.role}</div>
                </td>
                <td><span class="badge" style="background:var(--pink-bg); color:var(--primary);">${emp.totalDays}</span></td>
                <td><span style="font-weight:700; color:var(--success);">${emp.presentDays}</span></td>
                <td><span style="font-weight:700; color:var(--warning);">${emp.halfDays}</span></td>
                <td><span style="font-weight:700; color:var(--danger);">${emp.absentDays + emp.leaveDays}</span></td>
                <td><strong>${Number(emp.totalHoursWorked).toFixed(2)}</strong> hrs</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function openModal(emp) {
        document.getElementById('modalTitle').innerText = `Attendance: ${emp.fullName} (${emp.employeeId})`;
        const tbody = document.getElementById('modalTableBody');
        tbody.innerHTML = '';
        
        if (!emp.records || emp.records.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No records.</td></tr>';
        } else {
            emp.records.forEach(r => {
                const tr = document.createElement('tr');
                const statClass = r.status==='Present'?'badge-ok':r.status==='Half Day'?'badge-pending':'badge-no';
                tr.innerHTML = `
                    <td>${r.date}</td>
                    <td>${r.loginTime ? new Date(r.loginTime).toLocaleTimeString() : '-'}</td>
                    <td>${r.logoutTime ? new Date(r.logoutTime).toLocaleTimeString() : '-'}</td>
                    <td>${Number(r.hoursWorked||0).toFixed(2)}</td>
                    <td><span class="badge ${statClass}">${r.status}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }
        
        document.getElementById('empModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('empModal').style.display = 'none';
    }

    function downloadCompanyExcel() {
        if (!companyAttendanceData || companyAttendanceData.length === 0) return alert('No data to export.');
        
        let allRecords = [];
        companyAttendanceData.forEach(emp => {
            if(emp.records) {
                emp.records.forEach(r => {
                    allRecords.push({
                        'Employee Name': emp.fullName,
                        'Employee ID': emp.employeeId,
                        'Date': r.date,
                        'Check In': r.loginTime ? new Date(r.loginTime).toLocaleTimeString() : '',
                        'Check Out': r.logoutTime ? new Date(r.logoutTime).toLocaleTimeString() : '',
                        'Hours': Number(r.hoursWorked||0).toFixed(2),
                        'Status': r.status
                    });
                });
            }
        });

        const worksheet = XLSX.utils.json_to_sheet(allRecords);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Company Attendance");
        XLSX.writeFile(workbook, `EXO_Company_Attendance.xlsx`);
    }

    /* --- EMPLOYEE LOGIC --- */
    function initClock() {
        setInterval(() => {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById('liveDate').innerText = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }, 1000);
    }

    async function loadMyAttendance() {
        try {
            // Check today's status
            const res = await fetch('/api/attendance/today', { headers: { Authorization: `Bearer ${token}` }});
            const todayRecord = await res.json();
            
            const btnIn = document.getElementById('checkInBtn');
            const btnOut = document.getElementById('checkOutBtn');
            const pill = document.getElementById('statusPill');

            if (todayRecord) {
                if (!todayRecord.logoutTime) {
                    btnIn.disabled = true;
                    btnOut.disabled = false;
                    pill.style.display = 'block';
                    pill.innerText = `Checked in at ${new Date(todayRecord.loginTime).toLocaleTimeString()}`;
                } else {
                    btnIn.disabled = true;
                    btnOut.disabled = true;
                    pill.style.display = 'block';
                    pill.innerText = `Shift completed. ${Number(todayRecord.hoursWorked).toFixed(2)} hrs.`;
                }
            }

            // Load history
            const histRes = await fetch('/api/attendance/mine', { headers: { Authorization: `Bearer ${token}` }});
            const history = await histRes.json();
            const tbody = document.getElementById('myTableBody');
            tbody.innerHTML = '';
            
            history.forEach(r => {
                const tr = document.createElement('tr');
                const statClass = r.status==='Present'?'badge-ok':r.status==='Half Day'?'badge-pending':'badge-no';
                tr.innerHTML = `
                    <td>${r.date}</td>
                    <td>${r.loginTime ? new Date(r.loginTime).toLocaleTimeString() : '-'}</td>
                    <td>${r.logoutTime ? new Date(r.logoutTime).toLocaleTimeString() : '-'}</td>
                    <td>${Number(r.hoursWorked||0).toFixed(2)}</td>
                    <td><span class="badge ${statClass}">${r.status}</span></td>
                `;
                tbody.appendChild(tr);
            });
            if(history.length === 0) tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No history.</td></tr>';

        } catch(e) { console.error(e); }
    }

    async function checkIn() {
        try {
            const res = await fetch('/api/attendance/checkin', { method:'POST', headers:{ Authorization:`Bearer ${token}` } });
            if(res.ok) loadMyAttendance();
            else alert('Failed to check in');
        } catch(e) {}
    }

    async function checkOut() {
        try {
            const res = await fetch('/api/attendance/checkout', { method:'POST', headers:{ Authorization:`Bearer ${token}` } });
            if(res.ok) loadMyAttendance();
            else alert('Failed to check out');
        } catch(e) {}
    }

</script>
</body>
</html>
