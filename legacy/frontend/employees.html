<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workforce Management | EXO GLOBAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0a192f; --accent: #1d4ed8; --bg: #f0f2f5; --card-bg: #ffffff;
        }
        body { margin:0; background: var(--bg); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        #sidebar { width: 220px; background: #0a192f; border-right: none; display: flex; flex-direction: column; flex-shrink: 0; color: #ffffff; }
        .sb-header { height: 80px; display: flex; align-items: center; gap: 14px; padding: 0 24px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo-box { width: 42px; height: 42px; border-radius: 4px; background: linear-gradient(135deg, #118dff, #005a9e); display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; }
        .logo-text { font-weight: 700; font-size: 15px; color: #ffffff; }
        
        nav { flex: 1; padding: 24px 16px; }
        .nav-link { display: flex; align-items: center; gap: 14px; padding: 12px 14px; border-radius: 4px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; transition: 0.3s; margin-bottom: 4px; }
        .nav-link.active { background: rgba(255,255,255,0.1); color: #ffffff; box-shadow: inset 3px 0 0 #3b82f6; }

        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 80px; background: white; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .header h1 { font-family: 'Outfit'; font-size: 24px; font-weight: 800; color: var(--primary); }

        .content { flex: 1; overflow-y: auto; padding: 40px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
        
        .table-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .search-wrap { position: relative; width: 300px; }
        .search-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .search-wrap input { width: 100%; padding: 10px 10px 10px 40px; border-radius: 4px; border: 1px solid #e2e8f0; outline: none; }
        
        .btn-primary { background: var(--accent); color: white; padding: 12px 24px; border-radius: 4px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(59,130,246,0.3); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 16px; font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; }
        td { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 14px; }

        #modal { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 100; overflow-y: auto; padding: 40px 0; }
        .modal-content { background: white; width: 800px; padding: 40px; border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); position: relative; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 6px; text-transform: uppercase; }
        .form-input { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 4px; outline: none; font-size: 13px; }
        .btn-block { width: 100%; padding: 14px; border-radius: 4px; border: none; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
    
        /* Mobile Responsiveness */
        @media (max-width: 1024px) {
            .content { grid-template-columns: 1fr !important; gap: 20px; padding: 20px; }
            .dashboard-grid { grid-template-columns: 1fr !important; }
            .metrics-grid { grid-template-columns: repeat(2, 1fr) !important; }
            header, .topbar { padding: 0 20px !important; }
        }
        @media (max-width: 768px) {
            body { flex-direction: column !important; }
            #sidebar { width: 100% !important; height: auto !important; flex-direction: row !important; flex-wrap: wrap; justify-content: space-between; align-items: center; padding: 10px; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
            .logo { height: 40px !important; padding: 0 10px !important; border: none !important; font-size: 18px; width: 100%; justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.05) !important; margin-bottom: 5px; }
            .nav-list, nav { flex-direction: row !important; padding: 0 !important; width: 100% !important; overflow-x: auto !important; gap: 5px !important; align-items: center; }
            .nav-item { padding: 8px 12px !important; font-size: 13px !important; white-space: nowrap !important; border-radius: 4px !important; }
            .metrics-grid { grid-template-columns: 1fr !important; }
            header, .topbar { height: auto !important; flex-direction: column !important; padding: 15px !important; align-items: stretch !important; gap: 15px !important; }
            .search { width: 100% !important; }
            .top-right { width: 100% !important; justify-content: space-between !important; }
            .dashboard { padding: 15px !important; }
            .modal { width: 95% !important; padding: 20px !important; border-radius: 12px !important; max-height: 80vh !important; }
            .chat-container { flex-direction: column !important; }
            .chat-sidebar { width: 100% !important; height: 250px !important; border-right: none !important; border-bottom: 1px solid var(--border) !important; flex-shrink: 0; }
            .ticket-header { flex-direction: column !important; gap: 10px !important; align-items: flex-start !important; }
            .action-bar { flex-direction: column !important; align-items: flex-start !important; gap: 15px !important; }
            .detail-pane { border-radius: 12px !important; }
            .btn { width: 100% !important; justify-content: center !important; }
        }

    
/* ── SIDEBAR ── */
#sidebar{width:250px;background:#1e293b;border-right:2px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
@media (min-width: 769px) { #sidebar { height: 100vh; position: sticky; top: 0; } }
.logo{height:100px;padding:0 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;justify-content:center;}
.logo-icon{width:52px;height:52px;border-radius:8px;background:transparent;display:flex;align-items:center;justify-content:center;overflow:hidden;border:none}
.logo-icon img{width:100%;height:100%;object-fit:contain;border-radius:8px}
.logo-text{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:#fff}
#sidebar nav{flex:1;padding:18px 12px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;}
.nav-link{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:4px;color:#ffffff;text-decoration:none;font-weight:600;transition:.2s;border:1px solid transparent;font-size:13px}
.nav-link:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.05)}
.nav-link.active{background:rgba(14,165,233,0.15);border:1px solid var(--primary);box-shadow:inset 3px 0 0 var(--primary)}
.nav-link .count-badge{background:var(--primary);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:99px;margin-left:auto}

</style>
</head>
<body>


<aside id="sidebar">
    <div class="logo"><img src="exologo.png?v=2" class="sidebar-logo" style="width:80px;height:80px;border-radius:8px;object-fit:contain;"/></div>
    <nav>
        <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-house"></i> Dashboard</a>
        <a href="employees.html" class="nav-link"><i class="fa-solid fa-users"></i> Employees</a>
        <a href="attendance.html" class="nav-link"><i class="fa-solid fa-user-check"></i> Attendance</a>
        <a href="tickets.html" class="nav-link"><i class="fa-solid fa-ticket"></i> Tickets</a>
        <a href="chat.html" class="nav-link"><i class="fa-solid fa-message"></i> Chat</a>
        <a href="meeting.html" class="nav-link"><i class="fa-solid fa-video"></i> Live Meeting</a>
        <a href="documents.html" class="nav-link"><i class="fa-solid fa-folder-open"></i> Documents</a>
        <a href="history.html" class="nav-link"><i class="fa-solid fa-clock-rotate-left"></i> History Center</a>
        <a href="undertakings.html" class="nav-link" id="navUndertakings" style="display:none;"><i class="fa-solid fa-handshake"></i> Undertakings</a>
        <div style="flex:1"></div>
        <a href="profile.html" class="nav-link"><i class="fa-solid fa-id-badge"></i> My Profile</a>
        <a href="javascript:void(0)" onclick="logout()" class="nav-link" style="color:var(--danger)"><i class="fa-solid fa-power-off"></i> Logout</a>
    </nav>
</aside>


<div id="main">
    <header class="header">
        <h1>Workforce Management</h1>
        <div id="userHeaderName" style="font-weight: 600; color: #64748b;">Admin</div>
    </header>

    <main class="content">
        <div class="card">
            <div class="table-controls">
                <div class="search-wrap">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchEmp" placeholder="Search by name or ID..." oninput="renderTable()">
                </div>
                <button class="btn-primary" onclick="showModal()">+ New Employee Registration</button>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>Employee ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Department</th>
                    </tr>
                </thead>
                <tbody id="empTable"></tbody>
            </table>
        </div>
    </main>
</div>

<div id="modal">
    <div class="modal-content">
                <h2 id="modalTitle" style="font-family:'Outfit'; margin-bottom: 20px; font-size: 24px; color:var(--primary);">Register New Employee</h2>
        <form id="regForm">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px;">
                
                <!-- Account Info -->
                <div style="background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <h3 style="font-size:14px; font-weight:700; color:#334155; margin-bottom:15px; border-bottom:1px solid #cbd5e1; padding-bottom:8px;">Account Information</h3>
                    <div class="form-group">
                        <label class="form-label">Employee ID (Login ID)</label>
                        <input type="text" name="employeeId" class="form-input" placeholder="EXO-2601" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="fullName" class="form-input" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Initial Password</label>
                        <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                    </div>
                </div>

                <!-- Professional Details -->
                <div style="background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <h3 style="font-size:14px; font-weight:700; color:#334155; margin-bottom:15px; border-bottom:1px solid #cbd5e1; padding-bottom:8px;">Professional Details</h3>
                    <div class="form-group">
                        <label class="form-label">Role</label>
                        <select name="role" class="form-input">
                            <option value="Employee">Employee</option>
                            <option value="Level 3">Level 3</option>
                            <option value="Level 4">Level 4</option>
                            <option value="Level 5">Level 5</option>
                            <option value="CEO">CEO</option>
                            <option value="Chairman">Chairman</option>
                            <option value="IT Admin">IT Admin</option>
                            <option value="HR">HR</option>
                            <option value="HR Manager">HR Manager</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Department</label>
                        <input type="text" name="department" class="form-input" placeholder="Operations">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Date of Joining</label>
                        <input type="date" name="joiningDate" class="form-input">
                    </div>
                </div>

                <!-- Contact Info -->
                <div style="background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <h3 style="font-size:14px; font-weight:700; color:#334155; margin-bottom:15px; border-bottom:1px solid #cbd5e1; padding-bottom:8px;">Contact Information</h3>
                    <div class="form-group">
                        <label class="form-label">Work Email</label>
                        <input type="email" name="email" class="form-input" placeholder="john@exo.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone Num</label>
                        <input type="text" name="phone" class="form-input" placeholder="+351 9... or +91 ...">
                    </div>
                    <div class="form-group">
                        <label class="form-label">WhatsApp Num</label>
                        <input type="text" name="whatsappNumber" class="form-input" placeholder="+351 9... or +91 ...">
                    </div>
                </div>

                <!-- Compliance -->
                <div style="background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <h3 style="font-size:14px; font-weight:700; color:#334155; margin-bottom:15px; border-bottom:1px solid #cbd5e1; padding-bottom:8px;">Compliance</h3>
                    <div class="form-group">
                        <label class="form-label">NIF Number</label>
                        <input type="text" name="nif" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Passport Num</label>
                        <input type="text" name="passportNumber" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">IBAN Account</label>
                        <input type="text" name="iban" class="form-input">
                    </div>
                </div>
            </div>
            
            <div style="display:flex; gap:15px; justify-content: flex-end; border-top:1px solid #e2e8f0; padding-top:20px;">
                <button type="button" class="btn-block" style="background:none; color:#64748b; width:auto; padding:12px 24px;" onclick="hideModal()">Cancel</button>
                <button type="button" id="saveBtn" class="btn-block btn-primary" style="width:auto; padding:12px 30px; margin:0;" onclick="saveUser(event)">Save Employee</button>
            </div></form>
    </div>
</div>

<script>
const token = localStorage.getItem('token');
if (!token) window.location.href = '/';
let allUsers = [], isEditMode = false, currentEditId = null;
const currentUser = JSON.parse(localStorage.getItem('user') || '{}');

window.addEventListener('DOMContentLoaded', () => {
    if (currentUser.role !== 'IT Admin') {
        const b = document.querySelector('button[onclick="showModal()"]');
        if (b) b.style.display = 'none';
    }
});

async function loadUsers() {
    try {
        const r = await fetch('/api/auth/users', { headers: { Authorization: `Bearer ${token}` } });
        allUsers = await r.json();
        renderTable();
        const p = new URLSearchParams(window.location.search);
        const e = p.get('edit');
        if (e) { const u = allUsers.find(x => x.employeeId === e); if (u) prepareEdit(e); }
    } catch (e) { console.error(e); }
}

function renderTable() {
    const b = document.getElementById('empTable');
    const q = document.getElementById('searchEmp').value.toLowerCase();
    b.innerHTML = '';
    allUsers.forEach(u => {
        if (!u.fullName.toLowerCase().includes(q) && !u.employeeId.toLowerCase().includes(q)) return;
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td style="font-weight:800;color:var(--accent);cursor:pointer" onclick="impersonate('${u.employeeId}')">${u.employeeId}</td>
            <td style="font-weight:600">${u.fullName}</td>
            <td style="color:#64748b">${u.email}</td>
            <td><span style="font-weight:700">${u.role}</span></td>
            <td>${u.department || '\u2014'}</td>
            <td style="text-align:right;white-space:nowrap">
                <button class="btn-primary" style="padding:4px 8px;font-size:12px;margin-right:5px" onclick="prepareEdit('${u.employeeId}')"><i class="fa-solid fa-pen"></i></button>
                <button class="btn-primary" style="padding:4px 8px;font-size:12px;background:#e11d48" onclick="deleteUser('${u.employeeId}','${u.fullName}')"><i class="fa-solid fa-trash"></i></button>
            </td>`;
        b.appendChild(tr);
    });
}

async function deleteUser(eid, name) {
    if (!confirm('Delete ' + name + ' (' + eid + ')?')) return;
    try {
        const r = await fetch(`/api/auth/user/${eid}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
        if (r.ok) { alert('Deleted'); location.reload(); } else alert('Failed');
    } catch (e) { alert('Error'); }
}

async function impersonate(eid) {
    if (!confirm('Switch to ' + eid + '?')) return;
    try {
        const r = await fetch(`/api/auth/impersonate/${eid}`, { method: 'POST', headers: { Authorization: `Bearer ${token}` } });
        const d = await r.json();
        if (r.ok) { localStorage.setItem('token', d.token); localStorage.setItem('user', JSON.stringify(d.user)); window.location.href = '/dashboard.html'; }
        else alert(d.error);
    } catch (e) { alert('Failed'); }
}

function showModal(isEdit = false) {
    isEditMode = isEdit;
    document.getElementById('modalTitle').innerText = isEdit ? 'Update Employee' : 'Register New Employee';
    document.getElementById('saveBtn').innerText = isEdit ? 'Save Changes' : 'Register Account';
    document.getElementById('modal').style.display = 'flex';
    if (!isEdit) { document.getElementById('regForm').reset(); document.getElementById('regForm').employeeId.readOnly = false; }
}

function hideModal() { document.getElementById('modal').style.display = 'none'; }

function prepareEdit(eid) {
    const u = allUsers.find(x => x.employeeId === eid);
    if (!u) return;
    currentEditId = eid;
    const f = document.getElementById('regForm');
    f.employeeId.value = u.employeeId; f.employeeId.readOnly = true;
    f.fullName.value = u.fullName; f.email.value = u.email;
    f.password.value = ''; f.password.placeholder = 'Leave blank to keep current';
    f.role.value = u.role; f.department.value = u.department || '';
    f.whatsappNumber.value = u.whatsappNumber || '';
    if (f.phone) f.phone.value = u.phone || '';
    showModal(true);
}

async function saveUser(event) {
    const f = document.getElementById('regForm');
    const req = isEditMode ? ['fullName', 'email'] : ['employeeId', 'fullName', 'email', 'password'];
    for (let r of req) { if (!f[r].value) return alert(r + ' is required!'); }
    const fd = new FormData(f);
    const data = Object.fromEntries(fd.entries());
    if (isEditMode && !data.password) delete data.password;
    const btn = event.target;
    btn.disabled = true; btn.innerText = 'Processing...';
    try {
        const url = isEditMode ? `/api/auth/user/${currentEditId}` : '/api/auth/create';
        const r = await fetch(url, { method: isEditMode ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` }, body: JSON.stringify(data) });
        const res = await r.json();
        if (r.ok) { alert(isEditMode ? 'Updated!' : 'Account created!'); hideModal(); loadUsers(); }
        else { alert(res.error || 'Failed'); }
    } catch (e) { alert('Network error'); }
    finally { btn.disabled = false; btn.innerText = isEditMode ? 'Save Changes' : 'Register Account'; }
}

loadUsers();
</script>
<script src="/js/notifications.js"></script>
    <script src="/js/nav-sync.js"></script>
</body>
</html>
